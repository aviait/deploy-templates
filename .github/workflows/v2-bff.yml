          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');

          const vars = JSON.parse(process.env.VARS_JSON || '{}');

          const pickString = (...values) => {
            for (const v of values) {
              if (v === undefined || v === null) continue;
              const s = String(v).trim();
              if (s !== '') return s;
            }
            return '';
          };

          const pickPositiveInt = (fallback, ...values) => {
            for (const v of values) {
              if (v === undefined || v === null) continue;
              const s = String(v).trim();
              if (s === '' || s === '0') continue;
              const n = Number(s);
              if (Number.isFinite(n) && n > 0) return Math.floor(n);
            }
            return fallback;
          };

          const pickNonNegativeInt = (fallback, ...values) => {
            for (const v of values) {
              if (v === undefined || v === null) continue;
              const s = String(v).trim();
              if (s === '') continue;
              const n = Number(s);
              if (Number.isFinite(n) && n >= 0) return Math.floor(n);
            }
            return fallback;
          };

          const toBool = (v, fallback = false) => {
            if (v === undefined || v === null) return fallback;
            const s = String(v).trim().toLowerCase();
            if (s === '') return fallback;
            if (['1', 'true', 'yes', 'y', 'on'].includes(s)) return true;
            if (['0', 'false', 'no', 'n', 'off'].includes(s)) return false;
            return fallback;
          };

          const resolveEnvSuffix = (v) => {
            const raw = String(v || '').trim();
            if (!raw) return '';
            const upper = raw.toUpperCase();
            if (['DEV', 'HML', 'PRD'].includes(upper)) return upper;
            const lower = raw.toLowerCase();
            if (['dev', 'development'].includes(lower)) return 'DEV';
            if (['hml', 'homologation', 'stage', 'staging', 'uat'].includes(lower)) return 'HML';
            if (['prd', 'prod', 'production'].includes(lower)) return 'PRD';
            return '';
          };

          const envSuffix = resolveEnvSuffix(process.env.IN_PIPELINE_ENV);
          const scopedVar = (baseKey) => {
            if (envSuffix) {
              const scopedKey = `${baseKey}_${envSuffix}`;
              const scopedValue = vars[scopedKey];
              if (scopedValue !== undefined && scopedValue !== null && String(scopedValue).trim() !== '') {
