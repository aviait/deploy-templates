          IN_INJECT_ALL_GIT_VARS: ${{ inputs.inject_all_git_vars }}
          IN_GIT_VARS_PREFIX: ${{ inputs.git_vars_prefix }}
          IN_GIT_VARS_EXCLUDE: ${{ inputs.git_vars_exclude }}
          IN_PIPELINE_ENV: ${{ inputs.environment }}
