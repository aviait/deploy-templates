name: v2 - BFF CI/CD

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      environment:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: "."
      node_version:
        required: false
        type: string
        default: "22"
      package_manager:
        required: false
        type: string
        default: "yarn"
      pnpm_version:
        required: false
        type: string
        default: "9"
      cache_dependency_path:
        required: false
        type: string
        default: ""
      lint_cmd:
        required: false
        type: string
        default: "yarn lint && yarn format:check"
      typecheck_cmd:
        required: false
        type: string
        default: "yarn typecheck"
      test_cmd:
        required: false
        type: string
        default: "yarn test"
      dockerfile:
        required: false
        type: string
        default: "Dockerfile"
      registry:
        required: false
        type: string
        default: ""
      image_namespace:
        required: false
        type: string
        default: ""
      image_name:
        required: false
        type: string
        default: ""
      container_name:
        required: false
        type: string
        default: ""
      container_port:
        required: false
        type: number
        default: 80
      host_port:
        required: false
        type: number
        default: 0
      ssh_user:
        required: false
        type: string
        default: ""
      ssh_host:
        required: false
        type: string
        default: ""
      ssh_remote_port:
        required: false
        type: number
        default: 0
      ssh_known_hosts:
        required: false
        type: string
        default: ""
      require_ssh_known_hosts:
        required: false
        type: boolean
        default: false
      docker_run_envs:
        required: false
        type: string
        default: ""
      docker_extra_args:
        required: false
        type: string
        default: ""
      migration_cmd:
        required: false
        type: string
        default: ""
      healthcheck_url:
        required: false
        type: string
        default: ""
      healthcheck_retries:
        required: false
        type: number
        default: 0
      healthcheck_delay_seconds:
        required: false
        type: number
        default: -1
      remote_docker_login:
        required: false
        type: boolean
        default: true
      image_retention_count:
        required: false
        type: number
        default: 0
      startup_check_retries:
        required: false
        type: number
        default: 0
      startup_check_delay_seconds:
        required: false
        type: number
        default: -1
      prune_runner:
        required: false
        type: boolean
        default: true
      semver_prefix:
        required: false
        type: string
        default: "v"
      enable_release:
        required: false
        type: boolean
        default: true
      deploy_on_tag_only:
        required: false
        type: boolean
        default: false
      inject_all_git_vars:
        required: false
        type: boolean
        default: true
      git_vars_prefix:
        required: false
        type: string
        default: ""
      git_vars_exclude:
        required: false
        type: string
        default: ""
    secrets:
      CHECKOUT_TOKEN:
        required: false
      GIT_TOKEN:
        required: false
      PEM_KEY:
        required: false
      DEPLOY_REGISTRY_USERNAME:
        required: false
      DEPLOY_REGISTRY_PASSWORD:
        required: false
      DOCKER_RUN_ENVS_FILE:
        required: false

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Validate pipeline inputs
        working-directory: .
        run: |
          set -euo pipefail
          [ -n "${{ inputs.app_name }}" ] || { echo "::error::app_name é obrigatório no caller consumidor."; exit 1; }
          if [ ! -d "${{ inputs.working_directory }}" ]; then
            echo "::error::working_directory '${{ inputs.working_directory }}' não existe no repositório."
            echo "::error::Ajuste o caller para o caminho correto da aplicação."
            exit 1
          fi

          if [ "${{ inputs.enable_release }}" != "true" ] && [ "${{ inputs.deploy_on_tag_only }}" = "true" ]; then
            echo "::error::Configuração inválida: enable_release=false com deploy_on_tag_only=true."
            echo "::error::Ajuste para enable_release=true (fluxo por tag) ou deploy_on_tag_only=false (deploy por branch)."
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.CHECKOUT_TOKEN || secrets.GIT_TOKEN || github.token }}

      - name: Setup Node
        if: ${{ inputs.cache_dependency_path == '' }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.package_manager }}

      - name: Setup Node (custom cache path)
        if: ${{ inputs.cache_dependency_path != '' }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.package_manager }}
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Setup pnpm
        if: ${{ inputs.package_manager == 'pnpm' }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm_version }}

      - name: Install (reproducible)
        run: |
          set -euo pipefail
          case "${{ inputs.package_manager }}" in
            npm) npm ci ;;
            yarn) corepack enable && yarn install --immutable ;;
            pnpm) corepack enable && pnpm install --frozen-lockfile ;;
            *) echo "::error::PACKAGE_MANAGER inválido"; exit 1 ;;
          esac

      - name: Lint
        run: ${{ inputs.lint_cmd }}
      - name: Typecheck
        run: ${{ inputs.typecheck_cmd }}
      - name: Test
        run: ${{ inputs.test_cmd }}

  build:
    name: build
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.CHECKOUT_TOKEN || secrets.GIT_TOKEN || github.token }}

      - name: Docker metadata
        id: meta
        run: |
          set -euo pipefail
          REF="${{ github.ref }}"
          EVENT_NAME="${{ github.event_name }}"
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"

          REGISTRY_INPUT="${{ inputs.registry }}"
          REGISTRY="${REGISTRY_INPUT,,}"

          IMAGE_INPUT="${{ inputs.image_name }}"
          IMAGE_NAME_SOURCE="input.image_name"
          if [ -z "${IMAGE_INPUT}" ]; then
            IMAGE_INPUT="${REPO#*/}"
            IMAGE_NAME_SOURCE="default.repository_name"
          fi

          # Fail early on common misconfigurations that lead to "invalid reference format".
          if [ -z "${REGISTRY}" ]; then
            echo "::error::registry vazio"
            exit 1
          fi
          if printf '%s' "${REGISTRY}" | grep -Eq '://|/|[[:space:]]'; then
            echo "::error::registry invalido: '${REGISTRY}'. Use apenas o host (ex.: ghcr.io, docker.io, registry.exemplo.com:5000), sem 'https://' e sem '/'."
            exit 1
          fi

          if printf '%s' "${IMAGE_INPUT}" | grep -Eq '://|[[:space:]]'; then
            echo "::error::image_name invalido: '${IMAGE_INPUT}'. Nao use URL e nao use espacos."
            exit 1
          fi
          if printf '%s' "${IMAGE_INPUT}" | grep -Eq '[@:]'; then
            echo "::error::image_name nao deve conter tag/digest (':' ou '@'). Informe somente o repositorio (ex.: 'aviait/tei-bff' ou '${REPO}/bff')."
            exit 1
          fi
          FIRST_SEGMENT="${IMAGE_INPUT%%/*}"
          if [ "${FIRST_SEGMENT}" != "${IMAGE_INPUT}" ]; then
            if printf '%s' "${FIRST_SEGMENT}" | grep -Eq '[\\.:]' || [ "${FIRST_SEGMENT}" = "localhost" ]; then
              echo "::error::image_name nao deve incluir o registry host (ex.: 'ghcr.io/...'). Use o input registry para isso."
              exit 1
            fi
          fi

          NS_FROM_INPUT="${{ inputs.image_namespace }}"
          if [ -n "${NS_FROM_INPUT}" ] && printf '%s' "${NS_FROM_INPUT}" | grep -Eq '[:/@]|[[:space:]]'; then
            echo "::error::image_namespace invalido: '${NS_FROM_INPUT}'. Use apenas o namespace (ex.: aviait), sem '/', ':', '@' e sem espacos."
            exit 1
          fi

          IMAGE_PATH="${IMAGE_INPUT}"
          IMAGE_NAMESPACE_SOURCE="embedded_in_image_name"
          if ! printf '%s' "${IMAGE_PATH}" | grep -q '/'; then
            NS_INPUT="${{ inputs.image_namespace }}"
            if [ -n "${NS_INPUT}" ]; then
              IMAGE_PATH="${NS_INPUT}/${IMAGE_PATH}"
              IMAGE_NAMESPACE_SOURCE="input.image_namespace"
            else
              echo "::error::IMAGE_NAMESPACE obrigatório quando IMAGE_NAME não inclui namespace."
              echo "::error::Configure IMAGE_NAMESPACE na plataforma (repo-config/defaults) ou informe IMAGE_NAME já no formato namespace/repo."
              exit 1
            fi
          fi

          # Docker Hub (docker.io) does not support multi-level repo paths like owner/repo/bff.
          if [ "${REGISTRY}" = "docker.io" ]; then
            SLASH_COUNT="$(printf '%s' "${IMAGE_PATH}" | awk -F/ '{print NF-1}')"
            if [ "${SLASH_COUNT}" -ne 1 ]; then
              echo "::error::Para Docker Hub (docker.io), a imagem deve ser no formato 'namespace/repo'. Recebido: '${IMAGE_PATH}'."
              echo "::error::Sugestao: defina image_name como 'namespace/repo' (ex.: 'aviait/tei-bff') e opcionalmente use image_namespace."
              exit 1
            fi
          fi

          IMAGE="${REGISTRY}/${IMAGE_PATH}"
          IMAGE="${IMAGE,,}"
          SHA_TAG="sha-${SHA::12}"
          STAGE_IMAGE="${IMAGE}:${SHA_TAG}"
          RELEASE_TAG=""
          RELEASE_IMAGE=""
          PUSH_IMAGE="true"

          if [ "${EVENT_NAME}" = "pull_request" ]; then
            PUSH_IMAGE="false"
          fi

          if [[ "${REF}" == refs/tags/${{ inputs.semver_prefix }}* ]]; then
            GIT_TAG="${REF#refs/tags/}"
            PKG_JSON="${{ inputs.working_directory }}/package.json"

            PACKAGE_VERSION=""
            if [ -f "${PKG_JSON}" ]; then
              PACKAGE_VERSION="$(python3 -c "import json,sys; print(str(json.load(open(sys.argv[1], encoding='utf-8')).get('version','')).strip())" "${PKG_JSON}" 2>/dev/null || true)"
            fi

            if [ -n "${PACKAGE_VERSION}" ]; then
              PREFIX="${{ inputs.semver_prefix }}"
              if [ "${GIT_TAG}" != "${PREFIX}${PACKAGE_VERSION}" ] && [ "${GIT_TAG}" != "${PACKAGE_VERSION}" ]; then
                echo "::error::Tag '${GIT_TAG}' nao corresponde a versao do package.json ('${PACKAGE_VERSION}'). Esperado '${PREFIX}${PACKAGE_VERSION}'."
                exit 1
              fi

              RELEASE_TAG="${PACKAGE_VERSION}"
            else
              echo "::warning::Nao foi possivel ler package.json version em '${PKG_JSON}'. Usando tag git como release_tag."
              RELEASE_TAG="${GIT_TAG}"
            fi

            RELEASE_IMAGE="${IMAGE}:${RELEASE_TAG}"
          fi

          {
            echo "registry=${REGISTRY}"
            echo "image_repository=${IMAGE_PATH}"
            echo "image_name_source=${IMAGE_NAME_SOURCE}"
            echo "image_namespace_source=${IMAGE_NAMESPACE_SOURCE}"
            echo "stage_image=${STAGE_IMAGE}"
            echo "release_image=${RELEASE_IMAGE}"
            echo "release_tag=${RELEASE_TAG}"
            echo "push_image=${PUSH_IMAGE}"
            echo "tags<<TAGLIST"
            echo "${STAGE_IMAGE}"
            echo "TAGLIST"
          } >> "$GITHUB_OUTPUT"

          echo "::notice::Resolved image repository ${REGISTRY}/${IMAGE_PATH} (image_name_source=${IMAGE_NAME_SOURCE}, image_namespace_source=${IMAGE_NAMESPACE_SOURCE})."

      - name: Validate build metadata outputs
        env:
          REGISTRY: ${{ steps.meta.outputs.registry }}
          IMAGE_REPOSITORY: ${{ steps.meta.outputs.image_repository }}
          IMAGE_NAME_SOURCE: ${{ steps.meta.outputs.image_name_source }}
          IMAGE_NAMESPACE_SOURCE: ${{ steps.meta.outputs.image_namespace_source }}
          STAGE_IMAGE: ${{ steps.meta.outputs.stage_image }}
          RELEASE_IMAGE: ${{ steps.meta.outputs.release_image }}
          PUSH_IMAGE: ${{ steps.meta.outputs.push_image }}
          IS_TAG: ${{ startsWith(github.ref, format('refs/tags/{0}', inputs.semver_prefix)) }}
          CALLER_WORKFLOW_REF: ${{ github.workflow_ref }}
          CALLER_WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          set -euo pipefail

          if [ -z "${REGISTRY}" ]; then
            echo "::error::registry vazio nos outputs do step Docker metadata."
            exit 1
          fi

          if [ -z "${IMAGE_REPOSITORY}" ]; then
            echo "::error::image_repository vazio nos outputs do step Docker metadata."
            exit 1
          fi

          if [ -z "${STAGE_IMAGE}" ]; then
            echo "::error::stage_image vazio nos outputs do step Docker metadata."
            exit 1
          fi

          if [ "${IS_TAG}" = "true" ] && [ -z "${RELEASE_IMAGE}" ]; then
            echo "::error::release_image vazio nos outputs do step Docker metadata para ref de tag."
            exit 1
          fi

          RELEASE_IMAGE_DISPLAY="${RELEASE_IMAGE}"
          if [ -z "${RELEASE_IMAGE_DISPLAY}" ]; then
            RELEASE_IMAGE_DISPLAY="(not_applicable)"
          fi

          echo "::notice::Build outputs ready (registry=${REGISTRY}, image_repository=${IMAGE_REPOSITORY}, stage_image=${STAGE_IMAGE}, release_image=${RELEASE_IMAGE_DISPLAY}, push_image=${PUSH_IMAGE}, image_name_source=${IMAGE_NAME_SOURCE}, image_namespace_source=${IMAGE_NAMESPACE_SOURCE})."
          {
            echo "## build image resolution"
            echo "- caller_workflow_ref: ${CALLER_WORKFLOW_REF}"
            echo "- caller_workflow_sha: ${CALLER_WORKFLOW_SHA}"
            echo "- registry: ${REGISTRY}"
            echo "- image_repository: ${IMAGE_REPOSITORY}"
            echo "- image_name_source: ${IMAGE_NAME_SOURCE}"
            echo "- image_namespace_source: ${IMAGE_NAMESPACE_SOURCE}"
            echo "- stage_image: ${STAGE_IMAGE}"
            echo "- release_image: ${RELEASE_IMAGE_DISPLAY}"
            echo "- push_image: ${PUSH_IMAGE}"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: docker/setup-buildx-action@v3

      - name: Validate registry credentials
        if: ${{ steps.meta.outputs.push_image == 'true' }}
        env:
          DEPLOY_REGISTRY_USERNAME: ${{ secrets.DEPLOY_REGISTRY_USERNAME }}
          DEPLOY_REGISTRY_PASSWORD: ${{ secrets.DEPLOY_REGISTRY_PASSWORD }}
          REGISTRY: ${{ steps.meta.outputs.registry }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_REGISTRY_USERNAME:-}" ] || [ -z "${DEPLOY_REGISTRY_PASSWORD:-}" ]; then
            echo "::error::DEPLOY_REGISTRY_USERNAME/DEPLOY_REGISTRY_PASSWORD obrigatórios para autenticar no registry ${{ steps.meta.outputs.registry }}."
            echo "::error::DOCKER_USERNAME/DOCKER_PASSWORD não são usados pelo workflow v2."
            exit 1
          fi

          DEPLOY_REGISTRY_USERNAME="$(printf '%s' "${DEPLOY_REGISTRY_USERNAME}" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          DEPLOY_REGISTRY_PASSWORD="$(printf '%s' "${DEPLOY_REGISTRY_PASSWORD}" | tr -d '\r' | sed -e 's/[[:space:]]*$//')"

          if [ -z "${DEPLOY_REGISTRY_USERNAME}" ] || [ -z "${DEPLOY_REGISTRY_PASSWORD}" ]; then
            echo "::error::DEPLOY_REGISTRY_USERNAME/DEPLOY_REGISTRY_PASSWORD ficaram vazios após normalização."
            echo "::error::Revise spaces/CRLF nas credenciais sincronizadas para o app."
            exit 1
          fi

          if [ "${REGISTRY}" = "docker.io" ]; then
            if ! curl -fsS \
              --user "${DEPLOY_REGISTRY_USERNAME}:${DEPLOY_REGISTRY_PASSWORD}" \
              "https://auth.docker.io/token?service=registry.docker.io&scope=repository:library/alpine:pull" \
              >/dev/null; then
              echo "::error::Falha ao validar DEPLOY_REGISTRY_* no token service do Docker Hub."
              echo "::error::O PAT/usuário sincronizado no app não autenticou em auth.docker.io."
              exit 1
            fi
          fi

      - name: Login registry
        if: ${{ steps.meta.outputs.push_image == 'true' }}
        env:
          DEPLOY_REGISTRY_USERNAME: ${{ secrets.DEPLOY_REGISTRY_USERNAME }}
          DEPLOY_REGISTRY_PASSWORD: ${{ secrets.DEPLOY_REGISTRY_PASSWORD }}
          REGISTRY: ${{ steps.meta.outputs.registry }}
        run: |
          set -euo pipefail
          DEPLOY_REGISTRY_USERNAME="$(printf '%s' "${DEPLOY_REGISTRY_USERNAME}" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          DEPLOY_REGISTRY_PASSWORD="$(printf '%s' "${DEPLOY_REGISTRY_PASSWORD}" | tr -d '\r' | sed -e 's/[[:space:]]*$//')"

          if [ "${REGISTRY}" = "docker.io" ]; then
            LOGIN_CMD=(docker login -u "${DEPLOY_REGISTRY_USERNAME}" --password-stdin)
          else
            LOGIN_CMD=(docker login "${REGISTRY}" -u "${DEPLOY_REGISTRY_USERNAME}" --password-stdin)
          fi

          if ! printf '%s' "${DEPLOY_REGISTRY_PASSWORD}" | "${LOGIN_CMD[@]}"; then
            echo "::error::Falha ao autenticar no registry ${REGISTRY} com DEPLOY_REGISTRY_USERNAME/DEPLOY_REGISTRY_PASSWORD."
            echo "::error::Revalide as credenciais no provisionador e sincronize os secrets DEPLOY_REGISTRY_* do app antes de reenfileirar o deploy."
            exit 1
          fi

      - name: Show vars and secrets before image build
        env:
          VARS_JSON: ${{ toJSON(vars) }}
          SECRET_CHECKOUT_TOKEN: ${{ secrets.CHECKOUT_TOKEN }}
          SECRET_GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          SECRET_DEPLOY_REGISTRY_USERNAME: ${{ secrets.DEPLOY_REGISTRY_USERNAME }}
          SECRET_DEPLOY_REGISTRY_PASSWORD: ${{ secrets.DEPLOY_REGISTRY_PASSWORD }}
          SECRET_DOCKER_RUN_ENVS_FILE: ${{ secrets.DOCKER_RUN_ENVS_FILE }}
          SECRET_PEM_KEY: ${{ secrets.PEM_KEY }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const vars = JSON.parse(process.env.VARS_JSON || '{}');
          const keys = Object.keys(vars).sort();
          console.log('Variables (name=value):');
          if (keys.length === 0) {
            console.log('(none)');
          } else {
            for (const key of keys) {
              const value = vars[key];
              if (typeof value === 'string') {
                console.log(`${key}=${value}`);
              } else {
                console.log(`${key}=${JSON.stringify(value)}`);
              }
            }
          }
          NODE

          echo "Secrets (name=masked):"
          mask_secret() {
            local name="$1"
            local value="${2:-}"
            if [ -n "$value" ]; then
              echo "${name}=***"
            else
              echo "${name}=(not set)"
            fi
          }

          mask_secret "CHECKOUT_TOKEN" "${SECRET_CHECKOUT_TOKEN:-}"
          mask_secret "GIT_TOKEN" "${SECRET_GIT_TOKEN:-}"
          mask_secret "DEPLOY_REGISTRY_USERNAME" "${SECRET_DEPLOY_REGISTRY_USERNAME:-}"
          mask_secret "DEPLOY_REGISTRY_PASSWORD" "${SECRET_DEPLOY_REGISTRY_PASSWORD:-}"
          mask_secret "DOCKER_RUN_ENVS_FILE" "${SECRET_DOCKER_RUN_ENVS_FILE:-}"
          mask_secret "PEM_KEY" "${SECRET_PEM_KEY:-}"

      - name: Build BFF image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.working_directory }}
          file: ${{ inputs.working_directory }}/${{ inputs.dockerfile }}
          push: ${{ steps.meta.outputs.push_image == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=bff-env
          cache-to: type=gha,mode=max,scope=bff-env

      - name: Save image metadata
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/bff-image.json" <<JSON
          {
            "registry": "${{ steps.meta.outputs.registry }}",
            "image_repository": "${{ steps.meta.outputs.image_repository }}",
            "image_name_source": "${{ steps.meta.outputs.image_name_source }}",
            "image_namespace_source": "${{ steps.meta.outputs.image_namespace_source }}",
            "stage_image": "${{ steps.meta.outputs.stage_image }}",
            "release_image": "${{ steps.meta.outputs.release_image }}",
            "release_tag": "${{ steps.meta.outputs.release_tag }}",
            "git_sha": "${{ github.sha }}",
            "environment": "${{ inputs.environment }}"
          }
          JSON

      - uses: actions/upload-artifact@v4
        with:
          name: bff-image-metadata
          path: ${{ runner.temp }}/bff-image.json

  security:
    name: security
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
      security-events: write
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.CHECKOUT_TOKEN || secrets.GIT_TOKEN || github.token }}

      - name: Setup Node
        if: ${{ inputs.cache_dependency_path == '' }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.package_manager }}

      - name: Setup Node (custom cache path)
        if: ${{ inputs.cache_dependency_path != '' }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.package_manager }}
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Setup pnpm
        if: ${{ inputs.package_manager == 'pnpm' }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm_version }}

      - name: Install (reproducible)
        run: |
          set -euo pipefail
          case "${{ inputs.package_manager }}" in
            npm) npm ci ;;
            yarn) corepack enable && yarn install --immutable ;;
            pnpm) corepack enable && pnpm install --frozen-lockfile ;;
            *) echo "::error::PACKAGE_MANAGER inválido"; exit 1 ;;
          esac

      - name: Dependency audit
        run: |
          set -euo pipefail
          case "${{ inputs.package_manager }}" in
            npm) npm audit --audit-level=high ;;
            yarn)
              if yarn npm audit --all >/dev/null 2>&1; then
                yarn npm audit --all --recursive
              else
                yarn audit --level high
              fi
              ;;
            pnpm) pnpm audit --audit-level high ;;
            *) echo "::error::PACKAGE_MANAGER inválido"; exit 1 ;;
          esac
        continue-on-error: true

      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN || github.token }}
        continue-on-error: true

      # - name: Initialize CodeQL
      #   uses: github/codeql-action/init@v3
      #   with:
      #     languages: javascript

      # - name: CodeQL Autobuild
      #   uses: github/codeql-action/autobuild@v3

      # - name: Analyze CodeQL
      #   uses: github/codeql-action/analyze@v3

  release:
    name: release
    if: ${{ inputs.enable_release && startsWith(github.ref, format('refs/tags/{0}', inputs.semver_prefix)) }}
    needs: [build, security]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bff-image-metadata
          path: ${{ runner.temp }}

      - name: Validate image metadata artifact for release
        env:
          IMAGE_METADATA_PATH: ${{ runner.temp }}/bff-image.json
          CALLER_WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail

          if [ ! -f "${IMAGE_METADATA_PATH}" ]; then
            echo "::error::Artifact de metadata da imagem ausente em ${IMAGE_METADATA_PATH}."
            echo "::error::O job build precisa publicar bff-image.json com stage_image/release_image."
            exit 1
          fi

          eval "$(
            python3 -c 'import json,sys; data=json.load(open(sys.argv[1], encoding="utf-8")); [print(f"{key.upper()}={str(data.get(key, "") or "").strip()}") for key in ("registry", "stage_image", "release_image")]' "${IMAGE_METADATA_PATH}"
          )"

          if [ -z "${REGISTRY}" ]; then
            echo "::error::registry vazio no artifact de metadata da imagem."
            exit 1
          fi

          if [ -z "${STAGE_IMAGE}" ]; then
            echo "::error::stage_image vazio no artifact de metadata da imagem."
            echo "::error::O contrato do build agora depende do artifact bff-image.json; valide o step Save image metadata no caller ${CALLER_WORKFLOW_REF}."
            exit 1
          fi

          if [ -z "${RELEASE_IMAGE}" ]; then
            echo "::error::release_image vazio no artifact de metadata da imagem para ref de tag."
