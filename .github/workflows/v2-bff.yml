            ssh_user: pickString(process.env.IN_SSH_USER, scopedVar('SSH_USER')),
            ssh_host: pickString(process.env.IN_SSH_HOST, scopedVar('SSH_HOST')),
            ssh_remote_port: pickPositiveInt(22, process.env.IN_SSH_REMOTE_PORT, scopedVar('SSH_REMOTE_PORT')),
            ssh_known_hosts: pickString(process.env.IN_SSH_KNOWN_HOSTS, scopedVar('SSH_KNOWN_HOSTS')),
