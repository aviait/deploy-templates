    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
    steps:
      - name: Resolve deploy config (inputs + GitHub vars)
        id: resolve
        env:
          VARS_JSON: ${{ toJSON(vars) }}
          IN_APP_NAME: ${{ inputs.app_name }}
          IN_SSH_USER: ${{ inputs.ssh_user }}
          IN_SSH_HOST: ${{ inputs.ssh_host }}
          IN_SSH_REMOTE_PORT: ${{ inputs.ssh_remote_port }}
          IN_SSH_KNOWN_HOSTS: ${{ inputs.ssh_known_hosts }}
          IN_REQUIRE_SSH_KNOWN_HOSTS: ${{ inputs.require_ssh_known_hosts }}
          IN_CONTAINER_NAME: ${{ inputs.container_name }}
          IN_CONTAINER_PORT: ${{ inputs.container_port }}
          IN_HOST_PORT: ${{ inputs.host_port }}
          IN_DOCKER_RUN_ENVS: ${{ inputs.docker_run_envs }}
          IN_DOCKER_EXTRA_ARGS: ${{ inputs.docker_extra_args }}
          IN_MIGRATION_CMD: ${{ inputs.migration_cmd }}
          IN_HEALTHCHECK_URL: ${{ inputs.healthcheck_url }}
          IN_HEALTHCHECK_RETRIES: ${{ inputs.healthcheck_retries }}
          IN_HEALTHCHECK_DELAY_SECONDS: ${{ inputs.healthcheck_delay_seconds }}
          IN_REMOTE_DOCKER_LOGIN: ${{ inputs.remote_docker_login }}
          IN_IMAGE_RETENTION_COUNT: ${{ inputs.image_retention_count }}
          IN_STARTUP_CHECK_RETRIES: ${{ inputs.startup_check_retries }}
          IN_STARTUP_CHECK_DELAY_SECONDS: ${{ inputs.startup_check_delay_seconds }}
