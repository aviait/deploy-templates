            ssh-keyscan -T 10 -H -p "${{ steps.resolve.outputs.ssh_remote_port }}" "${{ steps.resolve.outputs.ssh_host }}" >> ~/.ssh/known_hosts
          fi

          sort -u ~/.ssh/known_hosts -o ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Configure SSH key
        run: |
          set -euo pipefail
          printf '%s\n' "${{ secrets.PEM_KEY }}" > ./deploy-key.pem
          chmod 600 ./deploy-key.pem

      - name: Build env file from GitHub vars
        id: auto_vars
        env:
          VARS_JSON: ${{ toJSON(vars) }}
          INJECT_ALL: ${{ steps.resolve.outputs.inject_all_git_vars }}
          EXCLUDE: ${{ steps.resolve.outputs.git_vars_exclude }}
          PIPELINE_ENV: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');

          const vars = JSON.parse(process.env.VARS_JSON || '{}');
          const includeAll = String(process.env.INJECT_ALL || '').toLowerCase() === 'true';
          const rawExclude = (process.env.EXCLUDE || '').trim();
          const patterns = rawExclude
            ? rawExclude.split(/[\n,]/).map((s) => s.trim()).filter(Boolean)
            : [];

          const resolveEnvSuffix = (v) => {
            const raw = String(v || '').trim();
            if (!raw) return '';
            const upper = raw.toUpperCase();
            if (['DEV', 'HML', 'PRD'].includes(upper)) return upper;
            const lower = raw.toLowerCase();
            if (['dev', 'development'].includes(lower)) return 'DEV';
            if (['hml', 'homologation', 'stage', 'staging', 'uat'].includes(lower)) return 'HML';
            if (['prd', 'prod', 'production'].includes(lower)) return 'PRD';
            return '';
          };

          const envSuffix = resolveEnvSuffix(process.env.PIPELINE_ENV);
          const suffixes = ['DEV', 'HML', 'PRD'];
          const suffixRe = new RegExp(`^(.*)_(${suffixes.join('|')})$`);

          const isValidEnvName = (k) => /^[A-Za-z_][A-Za-z0-9_]*$/.test(k);
          const matchPattern = (key, pattern) => {
            if (pattern.endsWith('*')) return key.startsWith(pattern.slice(0, -1));
            return key === pattern;
          };

          const secretOnlyNames = new Set([
            'DOCKER_RUN_ENVS_FILE',
            'PEM_KEY',
            'DEPLOY_REGISTRY_USERNAME',
            'DEPLOY_REGISTRY_PASSWORD',
            'DEPLOY_REGISTRY_USERNAME_DEV',
            'DEPLOY_REGISTRY_PASSWORD_DEV',
            'DEPLOY_REGISTRY_USERNAME_HML',
            'DEPLOY_REGISTRY_PASSWORD_HML',
            'DEPLOY_REGISTRY_USERNAME_PRD',
            'DEPLOY_REGISTRY_PASSWORD_PRD',
          ]);

          const excluded = (key) =>
            secretOnlyNames.has(key) || patterns.some((p) => matchPattern(key, p));

          let lines = [];
          let skippedInvalid = 0;
          let skippedMultiline = 0;
          let mappedEnvSuffix = 0;
          let skippedOtherEnvSuffix = 0;

          const addLine = (key, value) => {
            if (excluded(key)) return;
            if (!isValidEnvName(key)) {
              skippedInvalid += 1;
              return;
            }
            if (value === undefined || value === null) return;
            const str = String(value);
            if (/[\r\n\0]/.test(str)) {
              skippedMultiline += 1;
              return;
            }
            lines.push(`${key}=${str}`);
          };

          if (includeAll) {
            const keys = Object.keys(vars).sort();

            // If the environment is known (dev/hml/prd), collapse *_DEV|*_HML|*_PRD into a single key.
            // Example: S3_BUCKET_DEV -> S3_BUCKET (only for the selected environment).
            if (envSuffix) {
              const effective = new Map();

              // Base vars (no suffix) first.
              for (const key of keys) {
                if (suffixRe.test(key)) continue;
                if (excluded(key)) continue;
                if (!isValidEnvName(key)) {
                  skippedInvalid += 1;
                  continue;
                }
                const value = vars[key];
                if (value === undefined || value === null) continue;
                const str = String(value);
                if (/[\r\n\0]/.test(str)) {
                  skippedMultiline += 1;
                  continue;
                }
                effective.set(key, str);
              }

              // Selected env overrides.
              for (const key of keys) {
                const m = key.match(suffixRe);
                if (!m) continue;
                const baseKey = m[1];
                const suffix = m[2];
                if (suffix !== envSuffix) {
                  skippedOtherEnvSuffix += 1;
                  continue;
                }
                if (excluded(key) || excluded(baseKey)) continue;
                if (!isValidEnvName(baseKey)) {
                  skippedInvalid += 1;
                  continue;
                }
                const value = vars[key];
                if (value === undefined || value === null) continue;
                const str = String(value);
                if (/[\r\n\0]/.test(str)) {
                  skippedMultiline += 1;
                  continue;
                }
                effective.set(baseKey, str);
                mappedEnvSuffix += 1;
              }

              lines = Array.from(effective.entries())
                .sort(([a], [b]) => a.localeCompare(b))
                .map(([k, v]) => `${k}=${v}`);
            } else {
              // Unknown environment: keep original keys (including *_DEV|*_HML|*_PRD), but still apply excludes.
              for (const key of keys) addLine(key, vars[key]);
            }
          }

          const path = `${process.env.RUNNER_TEMP}/bff-auto-vars.env`;
          fs.writeFileSync(path, lines.length ? `${lines.join('\n')}\n` : '');

          const b64 = lines.length ? Buffer.from(fs.readFileSync(path)).toString('base64') : '';

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `auto_vars_count=${lines.length}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `skipped_invalid=${skippedInvalid}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `skipped_multiline=${skippedMultiline}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `env_suffix=${envSuffix}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `mapped_env_suffix=${mappedEnvSuffix}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `skipped_other_env_suffix=${skippedOtherEnvSuffix}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `auto_vars_b64=${b64}\n`);
          NODE

      - name: Validate template-bff runtime env contract
        env:
          AUTO_VARS_B64: ${{ steps.auto_vars.outputs.auto_vars_b64 }}
        run: |
          set -euo pipefail
          TMP_ENV_FILE="$(mktemp)"
          trap 'rm -f "${TMP_ENV_FILE}"' EXIT
          if [ -n "${AUTO_VARS_B64}" ]; then
            printf '%s' "${AUTO_VARS_B64}" | base64 -d > "${TMP_ENV_FILE}"
          else
            : > "${TMP_ENV_FILE}"
          fi

          required_keys=(APPLICATION NODE_ENV ACRONYM_ENVIRONMENT ENVIRONMENT PORT API_BASE_URL JWT_SECRET)
          missing_keys=()
          for key in "${required_keys[@]}"; do
            if ! grep -Eq "^${key}=" "${TMP_ENV_FILE}"; then
              missing_keys+=("${key}")
            fi
          done

          if [ "${#missing_keys[@]}" -gt 0 ]; then
            echo "::error::repo-config/vars incompleto para template-bff. Chaves ausentes no env-file gerado: ${missing_keys[*]}"
            echo "::error::Reaplique restore-defaults/apply para materializar o contrato completo de runtime."
            exit 1
          fi

          NODE_ENV_VALUE="$(grep -E '^NODE_ENV=' "${TMP_ENV_FILE}" | tail -n1 | cut -d= -f2-)"
          ACRONYM_VALUE="$(grep -E '^ACRONYM_ENVIRONMENT=' "${TMP_ENV_FILE}" | tail -n1 | cut -d= -f2-)"
          ENVIRONMENT_VALUE="$(grep -E '^ENVIRONMENT=' "${TMP_ENV_FILE}" | tail -n1 | cut -d= -f2-)"
          PORT_VALUE="$(grep -E '^PORT=' "${TMP_ENV_FILE}" | tail -n1 | cut -d= -f2-)"
          API_BASE_URL_VALUE="$(grep -E '^API_BASE_URL=' "${TMP_ENV_FILE}" | tail -n1 | cut -d= -f2-)"
          echo "::notice::template-bff runtime contract resolved (NODE_ENV=${NODE_ENV_VALUE}, ACRONYM_ENVIRONMENT=${ACRONYM_VALUE}, ENVIRONMENT=${ENVIRONMENT_VALUE}, PORT=${PORT_VALUE}, API_BASE_URL=${API_BASE_URL_VALUE}, JWT_SECRET_CONFIGURED=yes)."
          {
            echo "## template-bff runtime contract"
            echo "- node_env: ${NODE_ENV_VALUE}"
            echo "- acronym_environment: ${ACRONYM_VALUE}"
            echo "- environment: ${ENVIRONMENT_VALUE}"
            echo "- port: ${PORT_VALUE}"
            echo "- api_base_url: ${API_BASE_URL_VALUE}"
            echo "- jwt_secret_configured: yes"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/download-artifact@v4
        with:
          name: bff-image-metadata
          path: ${{ runner.temp }}

      - name: Deploy container via SSH
        env:
          IS_TAG: ${{ startsWith(github.ref, format('refs/tags/{0}', inputs.semver_prefix)) }}
          CALLER_WORKFLOW_REF: ${{ github.workflow_ref }}
          CALLER_WORKFLOW_SHA: ${{ github.workflow_sha }}
          SSH_USER: ${{ steps.resolve.outputs.ssh_user }}
          SSH_HOST: ${{ steps.resolve.outputs.ssh_host }}
          SSH_PORT: ${{ steps.resolve.outputs.ssh_remote_port }}
          HOST_PORT: ${{ steps.resolve.outputs.host_port }}
          CONTAINER_PORT: ${{ steps.resolve.outputs.container_port }}
          RUN_ENVS: ${{ steps.resolve.outputs.docker_run_envs }}
          RUN_ENVS_FILE_SECRET: ${{ secrets.DOCKER_RUN_ENVS_FILE }}
          AUTO_VARS_B64: ${{ steps.auto_vars.outputs.auto_vars_b64 }}
          EXTRA_ARGS: ${{ steps.resolve.outputs.docker_extra_args }}
          MIGRATION_CMD: ${{ steps.resolve.outputs.migration_cmd }}
          HEALTHCHECK_URL: ${{ steps.resolve.outputs.healthcheck_url }}
          HEALTHCHECK_RETRIES: ${{ steps.resolve.outputs.healthcheck_retries }}
          HEALTHCHECK_DELAY: ${{ steps.resolve.outputs.healthcheck_delay_seconds }}
          STARTUP_CHECK_RETRIES: ${{ steps.resolve.outputs.startup_check_retries }}
          STARTUP_CHECK_DELAY: ${{ steps.resolve.outputs.startup_check_delay_seconds }}
          IMAGE_RETENTION_COUNT: ${{ steps.resolve.outputs.image_retention_count }}
          REMOTE_DOCKER_LOGIN: ${{ steps.resolve.outputs.remote_docker_login }}
          CONTAINER_NAME: ${{ steps.resolve.outputs.container_name }}
          REGISTRY_USERNAME: ${{ secrets.DEPLOY_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.DEPLOY_REGISTRY_PASSWORD }}
          IMAGE_METADATA_PATH: ${{ runner.temp }}/bff-image.json
        run: |
          set -euo pipefail

          if [ ! -f "${IMAGE_METADATA_PATH}" ]; then
            echo "::error::Artifact de metadata da imagem ausente em ${IMAGE_METADATA_PATH}."
            echo "::error::O deploy depende do artifact bff-image.json publicado pelo job build."
            exit 1
          fi

          eval "$(
            python3 -c 'import json,sys; data=json.load(open(sys.argv[1], encoding="utf-8")); [print(f"{key.upper()}={str(data.get(key, "") or "").strip()}") for key in ("stage_image", "release_image")]' "${IMAGE_METADATA_PATH}"
          )"

          RELEASE_IMAGE_DISPLAY="${RELEASE_IMAGE}"
          if [ -z "${RELEASE_IMAGE_DISPLAY}" ]; then
            RELEASE_IMAGE_DISPLAY="(not_applicable)"
          fi

          echo "::notice::Deploy inputs received (stage_image=${STAGE_IMAGE:-<empty>}, release_image=${RELEASE_IMAGE_DISPLAY}, service_name=${CONTAINER_NAME}, host_port=${HOST_PORT}, container_port=${CONTAINER_PORT})."
          {
            echo "## deploy input contract"
            echo "- caller_workflow_ref: ${CALLER_WORKFLOW_REF}"
            echo "- caller_workflow_sha: ${CALLER_WORKFLOW_SHA}"
            echo "- incoming_stage_image: ${STAGE_IMAGE:-<empty>}"
            echo "- incoming_release_image: ${RELEASE_IMAGE_DISPLAY}"
            echo "- service_name: ${CONTAINER_NAME}"
            echo "- host_port: ${HOST_PORT}"
            echo "- container_port: ${CONTAINER_PORT}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -z "${STAGE_IMAGE}" ]; then
            echo "::error::stage_image vazio no artifact de metadata da imagem."
            echo "::error::O deploy depende do artifact bff-image.json; valide o step Save image metadata no caller ${CALLER_WORKFLOW_REF}."
            exit 1
          fi

          if [ "${IS_TAG}" = "true" ] && [ -z "${RELEASE_IMAGE}" ]; then
            echo "::error::release_image vazio no artifact de metadata da imagem para deploy por tag."
            echo "::error::O deploy por tag depende do artifact bff-image.json; valide o step Save image metadata no caller ${CALLER_WORKFLOW_REF}."
            exit 1
          fi

          TARGET_IMAGE="${STAGE_IMAGE}"
          if [ "${IS_TAG}" = "true" ] && [ -n "${RELEASE_IMAGE}" ]; then
            TARGET_IMAGE="${RELEASE_IMAGE}"
          fi

          if [ -z "${TARGET_IMAGE}" ]; then
            echo "::error::TARGET_IMAGE vazio (verifique build/release outputs e inputs de imagem)"
            exit 1
          fi
          if printf '%s' "${TARGET_IMAGE}" | grep -Eq '://|[[:space:]]'; then
            echo "::error::TARGET_IMAGE invalida: '${TARGET_IMAGE}'"
            exit 1
          fi
          echo "TARGET_IMAGE=${TARGET_IMAGE}"

          RUN_ENVS_B64="$(printf '%s' "${RUN_ENVS}" | base64 | tr -d '\n')"

          TMP_ENV_FILE="$(mktemp)"
          trap 'rm -f "${TMP_ENV_FILE}"' EXIT

          if [ -n "${RUN_ENVS_FILE_SECRET}" ]; then
            printf '%s\n' "${RUN_ENVS_FILE_SECRET}" >> "${TMP_ENV_FILE}"
          fi

          if [ -n "${AUTO_VARS_B64}" ]; then
            printf '%s' "${AUTO_VARS_B64}" | base64 -d >> "${TMP_ENV_FILE}"
          fi

          RUN_ENVS_FILE_B64=""
          if [ -s "${TMP_ENV_FILE}" ]; then
            RUN_ENVS_FILE_B64="$(base64 -w0 "${TMP_ENV_FILE}")"
          fi

          REPOSITORY="${TARGET_IMAGE%:*}"
          REGISTRY="${TARGET_IMAGE%%/*}"
          echo "REGISTRY=${REGISTRY}"
          echo "REPOSITORY=${REPOSITORY}"

          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts -o ConnectTimeout=10 -p "${SSH_PORT}" -i ./deploy-key.pem \
            "${SSH_USER}@${SSH_HOST}" \
            env \
            IMAGE_REF="${TARGET_IMAGE}" \
            REPOSITORY="${REPOSITORY}" \
            REGISTRY="${REGISTRY}" \
            REGISTRY_USERNAME="${REGISTRY_USERNAME}" \
            REGISTRY_PASSWORD="${REGISTRY_PASSWORD}" \
            REMOTE_DOCKER_LOGIN="${REMOTE_DOCKER_LOGIN}" \
            SERVICE_NAME="${CONTAINER_NAME}" \
            HOST_PORT="${HOST_PORT}" \
            CONTAINER_PORT="${CONTAINER_PORT}" \
            RUN_ENVS_B64="${RUN_ENVS_B64}" \
            RUN_ENVS_FILE_B64="${RUN_ENVS_FILE_B64}" \
            EXTRA_ARGS="${EXTRA_ARGS}" \
            MIGRATION_CMD="${MIGRATION_CMD}" \
            HEALTHCHECK_URL="${HEALTHCHECK_URL}" \
            HEALTHCHECK_RETRIES="${HEALTHCHECK_RETRIES}" \
            HEALTHCHECK_DELAY="${HEALTHCHECK_DELAY}" \
            STARTUP_CHECK_RETRIES="${STARTUP_CHECK_RETRIES}" \
            STARTUP_CHECK_DELAY="${STARTUP_CHECK_DELAY}" \
            IMAGE_RETENTION_COUNT="${IMAGE_RETENTION_COUNT}" \
            bash -s << 'EOF'
            set -euo pipefail

            if [ -z "${IMAGE_REF}" ]; then
              echo "IMAGE_REF vazio"
              exit 1
            fi
            if printf '%s' "${IMAGE_REF}" | grep -Eq '://|[[:space:]]'; then
              echo "IMAGE_REF invalida: '${IMAGE_REF}'"
              exit 1
            fi
            echo "IMAGE_REF=${IMAGE_REF}"
            echo "REGISTRY=${REGISTRY}"
            echo "SERVICE_NAME=${SERVICE_NAME}"

            TMP_ENV_FILE=""
            cleanup() {
              if [ -n "${TMP_ENV_FILE}" ] && [ -f "${TMP_ENV_FILE}" ]; then
                rm -f "${TMP_ENV_FILE}"
              fi
            }
            trap cleanup EXIT

            RUN_ENVS="$(printf '%s' "${RUN_ENVS_B64}" | base64 -d || true)"

            EXTRA_ARGS_ARRAY=()
            DOCKER_RUN_ARGS=(-d --restart unless-stopped --name "${SERVICE_NAME}" -p "${HOST_PORT}:${CONTAINER_PORT}")
            MIGRATION_ARGS=(--rm)

            if [ -n "${RUN_ENVS_FILE_B64}" ]; then
              TMP_ENV_FILE="$(mktemp)"
              printf '%s' "${RUN_ENVS_FILE_B64}" | base64 -d > "${TMP_ENV_FILE}"
              DOCKER_RUN_ARGS+=(--env-file "${TMP_ENV_FILE}")
              MIGRATION_ARGS+=(--env-file "${TMP_ENV_FILE}")
            fi

            if [ -n "${RUN_ENVS}" ]; then
              # Format supported:
              # - One per line: KEY=VALUE (recommended)
              # - Backward compatible: "-e KEY=VALUE" or "--env KEY=VALUE"
              while IFS= read -r line; do
                line="$(printf '%s' "${line}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
                [ -z "${line}" ] && continue
                case "${line}" in
                  \#*) continue ;;
                esac

                if printf '%s' "${line}" | grep -Eq '^(--env|-e)[[:space:]]+'; then
                  flag="${line%% *}"
                  val="${line#* }"
                  DOCKER_RUN_ARGS+=("${flag}" "${val}")
                  MIGRATION_ARGS+=("${flag}" "${val}")
                else
                  DOCKER_RUN_ARGS+=(--env "${line}")
                  MIGRATION_ARGS+=(--env "${line}")
                fi
              done <<< "${RUN_ENVS}"
            fi

            if [ -n "${EXTRA_ARGS}" ]; then
              read -r -a EXTRA_ARGS_ARRAY <<< "${EXTRA_ARGS}"
              DOCKER_RUN_ARGS+=("${EXTRA_ARGS_ARRAY[@]}")
            fi

            env_file_lines=0
            if [ -n "${TMP_ENV_FILE}" ] && [ -f "${TMP_ENV_FILE}" ]; then
              env_file_lines="$(wc -l < "${TMP_ENV_FILE}" | tr -d ' ')"
            fi

            inline_env_lines=0
            if [ -n "${RUN_ENVS}" ]; then
              inline_env_lines="$(printf '%s\n' "${RUN_ENVS}" | grep -vc '^[[:space:]]*$' || true)"
            fi

            inline_env_keys=""
            if [ -n "${RUN_ENVS}" ]; then
              inline_env_keys="$(printf '%s\n' "${RUN_ENVS}" | awk '
                /^[[:space:]]*$/ { next }
                /^[[:space:]]*#/ { next }
                {
                  line=$0
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", line)
                  if (line ~ /^(--env|-e)[[:space:]]+/) {
                    sub(/^(--env|-e)[[:space:]]+/, "", line)
                  }
                  split(line, kv, "=")
                  key=kv[1]
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", key)
                  if (key != "") {
                    print key
                  }
                }
              ' | sort -u | paste -sd ', ' -)"
            fi

            env_file_keys=""
            if [ -n "${TMP_ENV_FILE}" ] && [ -f "${TMP_ENV_FILE}" ]; then
              env_file_keys="$(awk '
                /^[[:space:]]*$/ { next }
                /^[[:space:]]*#/ { next }
                {
                  line=$0
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", line)
                  split(line, kv, "=")
                  key=kv[1]
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", key)
                  if (key != "") {
                    print key
                  }
                }
              ' "${TMP_ENV_FILE}" | sort -u | paste -sd ', ' -)"
            fi

            echo "docker run plan (sanitized):"
            echo "- image: ${IMAGE_REF}"
            echo "- name: ${SERVICE_NAME}"
            echo "- ports: ${HOST_PORT}:${CONTAINER_PORT}"
            echo "- env-file: $([ "${env_file_lines}" -gt 0 ] && echo "yes (lines=${env_file_lines})" || echo "no")"
            echo "- inline env: $([ "${inline_env_lines}" -gt 0 ] && echo "yes (lines=${inline_env_lines})" || echo "no")"
            echo "- extra args provided: $([ -n "${EXTRA_ARGS}" ] && echo "yes" || echo "no")"
            echo "- env keys (inline): ${inline_env_keys:-<none>}"
            echo "- env keys (env-file): ${env_file_keys:-<none>}"
            preview="docker run -d --restart unless-stopped --name '${SERVICE_NAME}' -p '${HOST_PORT}:${CONTAINER_PORT}'"
            if [ -n "${TMP_ENV_FILE}" ] && [ -f "${TMP_ENV_FILE}" ]; then
              preview="${preview} --env-file <env-file>"
            fi
            if [ -n "${RUN_ENVS}" ]; then
              while IFS= read -r line; do
                line="$(printf '%s' "${line}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
                [ -z "${line}" ] && continue
                case "${line}" in
                  \#*) continue ;;
                esac

                if printf '%s' "${line}" | grep -Eq '^(--env|-e)[[:space:]]+'; then
                  kv="${line#* }"
                else
                  kv="${line}"
                fi
                key="${kv%%=*}"
                if [ -n "${key}" ]; then
                  preview="${preview} --env '${key}=***'"
                fi
              done <<< "${RUN_ENVS}"
            fi
            if [ -n "${EXTRA_ARGS}" ]; then
              preview="${preview} [extra args redacted]"
            fi
            preview="${preview} '${IMAGE_REF}'"
            echo "docker run (redacted): ${preview}"

            is_sensitive_key() {
              # Conservative redaction. If a key looks like it might be sensitive, do not print its value.
              # This protects logs even when users store secrets in GitHub "vars" (which is not recommended).
              local k="${1:-}"
              k="${k^^}"
              case "${k}" in
                *SECRET*|*PASSWORD*|*PASS*|*TOKEN*|*PRIVATE*|*KEY*|*CREDENTIAL*|*CERT*|*COOKIE*|*SESSION*|*AUTH*|*SIGNING*|*SSH_*|*GPG_*|*PGP_*|*P12*|*KEYSTORE*|*MOBILEPROVISION*|*SERVICE_ACCOUNT*|*ACCESS_KEY* )
                  return 0
                  ;;
                *)
                  return 1
                  ;;
              esac
            }

            value_looks_sensitive() {
              local v="${1-}"

              # URLs with embedded credentials/userinfo (e.g. amqp://user:pass@host).
              if printf '%s' "${v}" | grep -Eq '^[A-Za-z][A-Za-z0-9+.-]*://[^/@[:space:]]+:[^@[:space:]]+@'; then
                return 0
              fi
              if printf '%s' "${v}" | grep -Eq '^[A-Za-z][A-Za-z0-9+.-]*://[^@[:space:]]+@'; then
                return 0
              fi

              # Raw JWT-like token (3 base64url-ish segments).
              if printf '%s' "${v}" | grep -Eq '^[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+$'; then
                return 0
              fi

              return 1
            }

            redact_value() {
              local v="${1-}"
              local len="${#v}"
              if command -v sha256sum >/dev/null 2>&1; then
                local h
                h="$(printf '%s' "${v}" | sha256sum | awk '{print $1}')"
                printf '<redacted len=%s sha256=%s>' "${len}" "${h}"
              else
                printf '<redacted len=%s>' "${len}"
              fi
            }

            if [ -n "${TMP_ENV_FILE}" ] && [ -f "${TMP_ENV_FILE}" ] && [ "${env_file_lines}" -gt 0 ]; then
              echo "env-file content (redacted):"
              while IFS= read -r line || [ -n "${line}" ]; do
                case "${line}" in
                  ''|\#*) continue ;;
                esac
                if ! printf '%s' "${line}" | grep -q '='; then
                  continue
                fi
                key="${line%%=*}"
                val="${line#*=}"
                key="$(printf '%s' "${key}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
                if [ -z "${key}" ]; then
                  continue
                fi
                if is_sensitive_key "${key}" || value_looks_sensitive "${val}"; then
                  printf '%s=%s\n' "${key}" "$(redact_value "${val}")"
                else
                  printf '%s=%s\n' "${key}" "${val}"
                fi
              done < "${TMP_ENV_FILE}" | sort
            fi

            PREVIOUS_IMAGE_ID="$(docker inspect -f '{{.Image}}' "${SERVICE_NAME}" 2>/dev/null || true)"

            if [ "${REMOTE_DOCKER_LOGIN}" = "true" ]; then
              REGISTRY_USERNAME="$(printf '%s' "${REGISTRY_USERNAME}" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
              REGISTRY_PASSWORD="$(printf '%s' "${REGISTRY_PASSWORD}" | tr -d '\r' | sed -e 's/[[:space:]]*$//')"

              if [ "${REGISTRY}" = "docker.io" ]; then
                printf '%s' "${REGISTRY_PASSWORD}" | docker login -u "${REGISTRY_USERNAME}" --password-stdin
              else
                printf '%s' "${REGISTRY_PASSWORD}" | docker login "${REGISTRY}" -u "${REGISTRY_USERNAME}" --password-stdin
              fi
            fi

            docker pull "${IMAGE_REF}"

            if [ -n "${MIGRATION_CMD}" ]; then
              docker run "${MIGRATION_ARGS[@]}" "${IMAGE_REF}" /bin/sh -lc "${MIGRATION_CMD}"
            fi

            docker stop "${SERVICE_NAME}" || true
            docker rm "${SERVICE_NAME}" || true

            if ! docker run "${DOCKER_RUN_ARGS[@]}" "${IMAGE_REF}"; then
              echo "Falha ao subir nova versão; rollback."
              docker logs --tail 200 "${SERVICE_NAME}" 2>/dev/null || true
              if [ -n "${PREVIOUS_IMAGE_ID}" ]; then
                docker run "${DOCKER_RUN_ARGS[@]}" "${PREVIOUS_IMAGE_ID}" || true
              fi
              exit 1
            fi

            echo "Container status (after docker run):"
            docker ps -a --filter "name=${SERVICE_NAME}" --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}\t{{.Ports}}' || true
            docker inspect -f 'state={{.State.Status}} exit={{.State.ExitCode}} restarting={{.State.Restarting}} started={{.State.StartedAt}} finished={{.State.FinishedAt}}' "${SERVICE_NAME}" 2>/dev/null || true
            container_env_keys="$(docker inspect -f '{{range .Config.Env}}{{println .}}{{end}}' "${SERVICE_NAME}" 2>/dev/null | cut -d= -f1 | sort -u | paste -sd ', ' - || true)"
            echo "Container env keys (inspect): ${container_env_keys:-<unable to read>}"
            if [ -n "${TMP_ENV_FILE}" ] && [ -f "${TMP_ENV_FILE}" ] && [ "${env_file_lines}" -gt 0 ]; then
              inspect_env="$(docker inspect -f '{{range .Config.Env}}{{println .}}{{end}}' "${SERVICE_NAME}" 2>/dev/null || true)"
              if [ -n "${inspect_env}" ]; then
                echo "Container env (inspect, redacted, injected keys):"
                while IFS= read -r key || [ -n "${key}" ]; do
                  [ -z "${key}" ] && continue
                  line="$(printf '%s\n' "${inspect_env}" | grep -m1 "^${key}=" || true)"
                  val="${line#*=}"
                  if is_sensitive_key "${key}" || value_looks_sensitive "${val}"; then
                    printf '%s=%s\n' "${key}" "$(redact_value "${val}")"
                  else
                    printf '%s=%s\n' "${key}" "${val}"
                  fi
                done < <(awk -F= '
                  /^[[:space:]]*$/ { next }
                  /^[[:space:]]*#/ { next }
                  $1 ~ /^[A-Za-z_][A-Za-z0-9_]*$/ { print $1 }
                ' "${TMP_ENV_FILE}" | sort -u) | sort
              fi
            fi

            attempt=1
            while [ "${attempt}" -le "${STARTUP_CHECK_RETRIES}" ]; do
              container_state="$(docker inspect -f '{{.State.Status}}' "${SERVICE_NAME}" 2>/dev/null || true)"
              if [ "${container_state}" = "running" ]; then
                break
              fi

              if [ "${container_state}" = "exited" ] || [ "${container_state}" = "dead" ]; then
                echo "Container entrou em estado crítico durante startup (state=${container_state}); rollback."
                docker ps -a --filter "name=${SERVICE_NAME}" || true
                docker logs --tail 200 "${SERVICE_NAME}" 2>/dev/null || true
                docker stop "${SERVICE_NAME}" || true
                docker rm "${SERVICE_NAME}" || true
                if [ -n "${PREVIOUS_IMAGE_ID}" ]; then
                  docker run "${DOCKER_RUN_ARGS[@]}" "${PREVIOUS_IMAGE_ID}" || true
                fi
                exit 1
              fi

              if [ "${container_state}" = "restarting" ]; then
                echo "Container em restarting durante startup (tentativa ${attempt}/${STARTUP_CHECK_RETRIES}); aguardando ${STARTUP_CHECK_DELAY}s"
              fi

              if [ "${attempt}" -eq "${STARTUP_CHECK_RETRIES}" ]; then
                echo "Container não ficou running; rollback."
                docker ps -a --filter "name=${SERVICE_NAME}" || true
                docker logs --tail 200 "${SERVICE_NAME}" 2>/dev/null || true
                docker stop "${SERVICE_NAME}" || true
                docker rm "${SERVICE_NAME}" || true
                if [ -n "${PREVIOUS_IMAGE_ID}" ]; then
                  docker run "${DOCKER_RUN_ARGS[@]}" "${PREVIOUS_IMAGE_ID}" || true
                fi
                exit 1
              fi

              attempt=$((attempt+1))
              sleep "${STARTUP_CHECK_DELAY}"
            done

            if [ -n "${HEALTHCHECK_URL}" ] && command -v curl >/dev/null 2>&1; then
              echo "Healthcheck config: url=${HEALTHCHECK_URL} retries=${HEALTHCHECK_RETRIES} delay=${HEALTHCHECK_DELAY}s"
              attempt=1
              ok=0
              while [ "${attempt}" -le "${HEALTHCHECK_RETRIES}" ]; do
                container_state="$(docker inspect -f '{{.State.Status}}' "${SERVICE_NAME}" 2>/dev/null || true)"
                if [ "${container_state}" != "running" ]; then
                  if [ "${container_state}" = "restarting" ]; then
                    echo "Container em restarting durante healthcheck (tentativa ${attempt}/${HEALTHCHECK_RETRIES}); aguardando ${HEALTHCHECK_DELAY}s"
                    attempt=$((attempt+1))
                    sleep "${HEALTHCHECK_DELAY}"
                    continue
                  fi
                  echo "Container saiu de running durante healthcheck (state=${container_state:-desconhecido})."
                  break
                fi
                hc_tmp="$(mktemp)"
                http_code="$(curl -sS --max-time 5 -o "${hc_tmp}" -w '%{http_code}' "${HEALTHCHECK_URL}" || true)"
                if printf '%s' "${http_code}" | grep -Eq '^2[0-9][0-9]$'; then
                  rm -f "${hc_tmp}"
                  ok=1
                  break
                fi
                echo "Healthcheck tentativa ${attempt}/${HEALTHCHECK_RETRIES} falhou (http=${http_code:-000})."
                if [ -s "${hc_tmp}" ]; then
                  echo "Resposta (primeiros 300 chars):"
                  head -c 300 "${hc_tmp}" || true
                  echo
                fi
                rm -f "${hc_tmp}"
                attempt=$((attempt+1))
                sleep "${HEALTHCHECK_DELAY}"
              done
              if [ "${ok}" -ne 1 ]; then
                echo "Healthcheck falhou; rollback."
                docker ps -a --filter "name=${SERVICE_NAME}" || true
                docker logs --tail 200 "${SERVICE_NAME}" 2>/dev/null || true
                docker stop "${SERVICE_NAME}" || true
                docker rm "${SERVICE_NAME}" || true
                if [ -n "${PREVIOUS_IMAGE_ID}" ]; then
                  docker run "${DOCKER_RUN_ARGS[@]}" "${PREVIOUS_IMAGE_ID}" || true
                fi
                exit 1
              fi
            fi

            OLD_IMAGE_IDS="$(docker image ls "${REPOSITORY}" --format '{{.CreatedAt}} {{.ID}}' | sort -r | awk "NR>${IMAGE_RETENTION_COUNT}{print \$2}")"
            if [ -n "${OLD_IMAGE_IDS}" ]; then
              echo "${OLD_IMAGE_IDS}" | xargs -r docker image rm -f || true
            fi
            docker image prune -f >/dev/null 2>&1 || true
          EOF

      - name: Remove SSH key
        if: always()
        run: rm -f ./deploy-key.pem

      - name: Prune runner
        if: ${{ always() && steps.resolve.outputs.prune_runner == 'true' }}
        run: docker system prune -af --volumes || true

      - name: Publish deploy summary
        if: always()
        run: |
          {
            echo "## deploy summary"
            echo "- app: ${{ inputs.app_name }}"
            echo "- environment: ${{ inputs.environment }}"
            echo "- ref: \`${{ github.ref }}\`"
            echo "- docker_run_envs provided: ${{ steps.resolve.outputs.docker_run_envs != '' && 'yes' || 'no' }}"
            echo "- docker_run_envs_file secret provided: ${{ secrets.DOCKER_RUN_ENVS_FILE != '' && 'yes' || 'no' }}"
            echo "- healthcheck_url: ${{ steps.resolve.outputs.healthcheck_url != '' && steps.resolve.outputs.healthcheck_url || '(disabled)' }}"
            echo "- startup_check: retries=${{ steps.resolve.outputs.startup_check_retries }}, delay=${{ steps.resolve.outputs.startup_check_delay_seconds }}s"
            echo "- auto vars injected: ${{ steps.auto_vars.outputs.auto_vars_count }}"
            echo "- env suffix collapse: ${{ steps.auto_vars.outputs.env_suffix != '' && steps.auto_vars.outputs.env_suffix || '(unknown)' }} (mapped=${{ steps.auto_vars.outputs.mapped_env_suffix }}, skipped_other=${{ steps.auto_vars.outputs.skipped_other_env_suffix }})"
            echo "- auto vars skipped (invalid name): ${{ steps.auto_vars.outputs.skipped_invalid }}"
            echo "- auto vars skipped (multiline/null): ${{ steps.auto_vars.outputs.skipped_multiline }}"
          } >> "$GITHUB_STEP_SUMMARY"

  summary:
    name: summary
    if: ${{ always() }}
    needs:
      - quality
      - build
      - security
      - release
      - pre_deploy_config
      - deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Publish pipeline summary
        run: |
          {
            echo "## v2-bff summary"
            echo ""
            echo "- ref: \`${{ github.ref }}\`"
            echo "- event: \`${{ github.event_name }}\`"
            echo "- environment: \`${{ inputs.environment }}\`"
            echo "- caller_workflow_ref: \`${{ github.workflow_ref }}\`"
            echo "- caller_workflow_sha: \`${{ github.workflow_sha }}\`"
            echo ""
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| quality | ${{ needs.quality.result }} |"
            echo "| build | ${{ needs.build.result }} |"
            echo "| security | ${{ needs.security.result }} |"
            echo "| release | ${{ needs.release.result }} |"
            echo "| pre-deploy-config | ${{ needs.pre_deploy_config.result }} |"
            echo "| deploy | ${{ needs.deploy.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish execution path
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
          RELEASE_RESULT: ${{ needs.release.result }}
          PRE_DEPLOY_RESULT: ${{ needs.pre_deploy_config.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          set -euo pipefail

          flow_part() {
            local label="$1"
            local result="$2"
            if [ "${result}" = "success" ]; then
              printf "%s" "${label}"
            elif [ "${result}" = "skipped" ]; then
              printf "(%s skipped)" "${label}"
            else
              printf "%s[%s]" "${label}" "${result}"
            fi
          }

          FLOW="$(flow_part "quality" "${QUALITY_RESULT}")"
          FLOW="${FLOW} -> $(flow_part "build" "${BUILD_RESULT}")"
          FLOW="${FLOW} -> $(flow_part "security" "${SECURITY_RESULT}")"
          FLOW="${FLOW} -> $(flow_part "release" "${RELEASE_RESULT}")"
          FLOW="${FLOW} -> $(flow_part "pre-deploy-config" "${PRE_DEPLOY_RESULT}")"
          FLOW="${FLOW} -> $(flow_part "deploy" "${DEPLOY_RESULT}")"

          OVERALL="success"
          for result in "${QUALITY_RESULT}" "${BUILD_RESULT}" "${SECURITY_RESULT}" "${RELEASE_RESULT}" "${PRE_DEPLOY_RESULT}" "${DEPLOY_RESULT}"; do
            if [ "${result}" = "failure" ] || [ "${result}" = "cancelled" ]; then
              OVERALL="failed"
              break
            fi
          done

          {
            echo ""
            echo "### execution path"
            echo "- overall: \`${OVERALL}\`"
            echo "- path: \`${FLOW}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce CI gates
        if: ${{ needs.quality.result == 'failure' || needs.quality.result == 'cancelled' || needs.build.result == 'failure' || needs.build.result == 'cancelled' || needs.security.result == 'failure' || needs.security.result == 'cancelled' || needs.pre_deploy_config.result == 'failure' || needs.pre_deploy_config.result == 'cancelled' }}
        run: |
          echo "::error::Falha nos gates obrigatórios (quality/build/security/pre-deploy-config)."
          exit 1
