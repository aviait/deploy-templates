        run: |
          set -euo pipefail
          eval "$(
            python3 -c 'import json,sys; data=json.load(open(sys.argv[1], encoding="utf-8")); [print(f"{key.upper()}={str(data.get(key, "") or "").strip()}") for key in ("stage_image", "release_image")]' "${IMAGE_METADATA_PATH}"
          )"

