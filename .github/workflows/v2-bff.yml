            remote_docker_login: toBool(process.env.IN_REMOTE_DOCKER_LOGIN, true),
            image_retention_count: pickPositiveInt(5, process.env.IN_IMAGE_RETENTION_COUNT, scopedVar('IMAGE_RETENTION_COUNT')),
            startup_check_retries: pickPositiveInt(6, process.env.IN_STARTUP_CHECK_RETRIES, scopedVar('STARTUP_CHECK_RETRIES')),
            startup_check_delay_seconds: pickNonNegativeInt(5, process.env.IN_STARTUP_CHECK_DELAY_SECONDS, scopedVar('STARTUP_CHECK_DELAY_SECONDS')),
            prune_runner: toBool(process.env.IN_PRUNE_RUNNER, true),
            inject_all_git_vars: toBool(process.env.IN_INJECT_ALL_GIT_VARS, true),
            git_vars_prefix: pickString(process.env.IN_GIT_VARS_PREFIX, scopedVar('GIT_VARS_PREFIX')),
            git_vars_exclude: pickString(process.env.IN_GIT_VARS_EXCLUDE, scopedVar('GIT_VARS_EXCLUDE')),
          };

          for (const [k, v] of Object.entries(out)) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `${k}=${String(v)}\n`);
          }
          NODE

      - name: Validate deploy config
        run: |
          set -euo pipefail
          [ -n "${{ steps.resolve.outputs.ssh_user }}" ] || { echo "::error::ssh_user ausente (input ou var SSH_USER)"; exit 1; }
          [ -n "${{ steps.resolve.outputs.ssh_host }}" ] || { echo "::error::ssh_host ausente (input ou var SSH_HOST)"; exit 1; }
          [ -n "${{ steps.resolve.outputs.container_name }}" ] || { echo "::error::container_name ausente (input ou var CONTAINER_NAME[_ENV])."; exit 1; }
          [ -n "${{ secrets.PEM_KEY }}" ] || { echo "::error::PEM_KEY ausente"; exit 1; }
          [ "${{ steps.resolve.outputs.host_port }}" -gt 0 ] || { echo "::error::host_port deve ser > 0 (input ou var HOST_PORT)"; exit 1; }
          [ "${{ steps.resolve.outputs.container_port }}" -gt 0 ] || { echo "::error::container_port deve ser > 0"; exit 1; }

          if [ "${{ steps.resolve.outputs.remote_docker_login }}" = "true" ] && { [ -z "${{ secrets.DEPLOY_REGISTRY_USERNAME }}" ] || [ -z "${{ secrets.DEPLOY_REGISTRY_PASSWORD }}" ]; }; then
            echo "::error::DEPLOY_REGISTRY_USERNAME/DEPLOY_REGISTRY_PASSWORD obrigatórios quando remote_docker_login=true"
            exit 1
          fi

          if [ "${{ steps.resolve.outputs.require_ssh_known_hosts }}" = "true" ] && [ -z "${{ steps.resolve.outputs.ssh_known_hosts }}" ]; then
            echo "::error::require_ssh_known_hosts=true exige ssh_known_hosts"
            exit 1
          fi

          if [ -z "${{ secrets.DOCKER_RUN_ENVS_FILE }}" ] && [ -z "${{ steps.resolve.outputs.docker_run_envs }}" ]; then
            echo "::warning::docker_run_envs vazio e DOCKER_RUN_ENVS_FILE não configurado. O container só receberá GitHub vars (se inject_all_git_vars=true). Secrets não são injetados automaticamente; use DOCKER_RUN_ENVS_FILE apenas para secrets-only de runtime."
          fi

      - name: Publish pre-deploy summary
        if: always()
        run: |
          {
