          if [ -z "${DEPLOY_REGISTRY_USERNAME}" ] || [ -z "${DEPLOY_REGISTRY_PASSWORD}" ]; then
            echo "::error::DEPLOY_REGISTRY_USERNAME/DEPLOY_REGISTRY_PASSWORD ficaram vazios após normalização."
