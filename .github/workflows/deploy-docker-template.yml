name: "[DEPRECATED] Deploy Docker Project Template"

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        required: true
        type: string
      PROJECT_NAME:
        required: true
        type: string
      SSH_USER:
        required: true
        type: string
      SSH_HOST:
        required: true
        type: string
      SSH_KNOWN_HOSTS:
        required: false
        type: string
        default: ""
      DOCKER_IMAGE:
        required: true
        type: string
      DEPLOY_REGISTRY_USERNAME:
        required: true
        type: string
      DEPLOY_REGISTRY_PASSWORD:
        required: true
        type: string
      DOCKER_RUN_ENVS:
        required: true
        type: string
      SSH_REMOTE_PORT:
        required: false
        type: number
        default: 22
    secrets:
      PEM_KEY:
        required: true

jobs:
  deploy:
    name: 🚀 Deploy Docker Project ${{ inputs.PROJECT_NAME }} (${{ inputs.ENVIRONMENT }})
    runs-on: ubuntu-latest

    steps:
      - name: ⚠️ Aviso de depreciação
        run: |
          echo "::warning::Template legado. Migre para .github/workflows/deploy-docker-template-v2.yml."
          {
            echo "## Aviso de depreciação"
            echo "Este workflow é legado e será removido em versão futura."
            echo "Migre para: \`.github/workflows/deploy-docker-template-v2.yml\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 🛒 Checkout código
        uses: actions/checkout@v6

      - name: 🛠️ Instalar dependências do projeto
        run: yarn install

      - name: 🏗️ Buildar o projeto
        run: yarn build

      - name: 🔑 Configurar chave SSH privada
        run: |
          echo "${{ secrets.PEM_KEY }}" > ./deploy-key.pem
          chmod 600 ./deploy-key.pem

      - name: 🔐 Registrar host SSH em known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "${{ inputs.SSH_KNOWN_HOSTS }}" ]; then
            printf '%s\n' "${{ inputs.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          fi
          ssh-keyscan -H -p ${{ inputs.SSH_REMOTE_PORT }} ${{ inputs.SSH_HOST }} >> ~/.ssh/known_hosts
          sort -u ~/.ssh/known_hosts -o ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: 🔢 Pegar versão do projeto
        id: version
        run: |
          VERSION=$(jq -r '.version' ./package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 🐳 Login no registry
        run: |
          echo "${{ inputs.DEPLOY_REGISTRY_PASSWORD }}" | docker login -u "${{ inputs.DEPLOY_REGISTRY_USERNAME }}" --password-stdin

      - name: 🐳 Build e Push da imagem Docker
        run: |
          docker build -t "${{ inputs.DEPLOY_REGISTRY_USERNAME }}/${{ inputs.DOCKER_IMAGE }}:${{ env.VERSION }}" .
          docker push "${{ inputs.DEPLOY_REGISTRY_USERNAME }}/${{ inputs.DOCKER_IMAGE }}:${{ env.VERSION }}"

      - name: 🚀 Atualizar container no servidor
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts -p ${{ inputs.SSH_REMOTE_PORT }} -i ./deploy-key.pem ${{ inputs.SSH_USER }}@${{ inputs.SSH_HOST }} << EOF
            docker pull "${{ inputs.DEPLOY_REGISTRY_USERNAME }}/${{ inputs.DOCKER_IMAGE }}:${{ env.VERSION }}"
            docker stop ${{ inputs.DOCKER_IMAGE }} || true
            docker rm ${{ inputs.DOCKER_IMAGE }} || true
            docker run -d --restart unless-stopped --name ${{ inputs.DOCKER_IMAGE }} \
              ${{ inputs.DOCKER_RUN_ENVS }} \
              "${{ inputs.DEPLOY_REGISTRY_USERNAME }}/${{ inputs.DOCKER_IMAGE }}:${{ env.VERSION }}"
          EOF

      - name: 🧹 Apagar chave privada após deploy
        if: always()
        run: rm -f ./deploy-key.pem
