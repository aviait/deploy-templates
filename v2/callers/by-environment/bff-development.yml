name: bff-v2-development

on:
  pull_request:
    branches:
      - development
    paths:
      - "apps/bff/**"
      - ".github/workflows/bff-development.yml"
  push:
    branches:
      - development
    paths:
      - "apps/bff/**"
      - ".github/workflows/bff-development.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  packages: write
  security-events: write

concurrency:
  group: bff-v2-development-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bff_dev:
    permissions:
      contents: write
      actions: read
      packages: write
      security-events: write
    uses: aviait/deploy-templates/.github/workflows/v2-bff.yml@main
    with:
      environment: ${{ vars.PIPELINE_ENV_DEV || 'dev' }}
      working_directory: apps/bff
      node_version: ${{ vars.NODE_VERSION || '22' }}
      package_manager: ${{ vars.PACKAGE_MANAGER || 'yarn' }}
      pnpm_version: ${{ vars.PNPM_VERSION || '9' }}
      cache_dependency_path: ${{ vars.CACHE_DEPENDENCY_PATH || 'yarn.lock' }}
      lint_cmd: ${{ vars.LINT_CMD || 'yarn lint && yarn format:check' }}
      typecheck_cmd: ${{ vars.TYPECHECK_CMD || 'yarn typecheck' }}
      test_cmd: ${{ vars.TEST_CMD || 'yarn test' }}
      dockerfile: ${{ vars.DOCKERFILE || 'Dockerfile' }}
      registry: ${{ vars.REGISTRY || 'ghcr.io' }}
      image_namespace: ${{ vars.IMAGE_NAMESPACE }}
      image_name: ${{ vars.IMAGE_NAME }}
      semver_prefix: ${{ vars.PIPELINE_SEMVER_PREFIX || 'v' }}
      enable_release: false
      deploy_on_tag_only: false
      inject_all_git_vars: ${{ vars.INJECT_ALL_GIT_VARS != 'false' }}
      git_vars_exclude: ${{ vars.GIT_VARS_EXCLUDE }}
    secrets:
      CHECKOUT_TOKEN: ${{ secrets.CHECKOUT_TOKEN }}
      GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
      PEM_KEY: ${{ secrets.PEM_KEY }}
      DEPLOY_REGISTRY_USERNAME: ${{ secrets.DEPLOY_REGISTRY_USERNAME }}
      DEPLOY_REGISTRY_PASSWORD: ${{ secrets.DEPLOY_REGISTRY_PASSWORD }}
      DOCKER_RUN_ENVS_FILE: ${{ secrets.DOCKER_RUN_ENVS_FILE }}
